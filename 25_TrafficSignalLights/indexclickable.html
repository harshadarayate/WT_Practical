<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Traffic Signal</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --housing-color: #333;
            --red-off: #440000;
            --red-on: #ff0000;
            --yellow-off: #444400;
            --yellow-on: #ffff00;
            --green-off: #004400;
            --green-on: #00ff00;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: sans-serif;
            color: white;
        }

        .container {
            text-align: center;
        }

        .traffic-light {
            background-color: var(--housing-color);
            width: 120px;
            padding: 25px;
            border-radius: 45px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            margin: 20px auto;
            border: 4px solid #222;
        }

        .light {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
            border: 2px solid rgba(0,0,0,0.3);
        }

        .light:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .red { background-color: var(--red-off); }
        .red.active { 
            background-color: var(--red-on); 
            box-shadow: 0 0 50px var(--red-on), inset 0 0 20px rgba(255,255,255,0.4);
        }

        .yellow { background-color: var(--yellow-off); }
        .yellow.active { 
            background-color: var(--yellow-on); 
            box-shadow: 0 0 50px var(--yellow-on), inset 0 0 20px rgba(255,255,255,0.4);
        }

        .green { background-color: var(--green-off); }
        .green.active { 
            background-color: var(--green-on); 
            box-shadow: 0 0 50px var(--green-on), inset 0 0 20px rgba(255,255,255,0.4);
        }

        p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .traffic-light {
                width: 90px;
                padding: 15px;
            }
            .light {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Manual Control</h2>
        <div class="traffic-light">
            <div id="red" class="light red active" onclick="activate('red')"></div>
            <div id="yellow" class="light yellow" onclick="activate('yellow')"></div>
            <div id="green" class="light green" onclick="activate('green')"></div>
        </div>
        <p>Click a color to change the signal</p>
    </div>

    <script>
        function activate(color) {
            // Remove active class from all lights
            const lights = document.querySelectorAll('.light');
            lights.forEach(light => light.classList.remove('active'));

            // Add active class to the clicked light
            document.getElementById(color).classList.add('active');
        }
    </script>
</body>
</html>
