<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Book Catalog - Book Haven</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Book Haven</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link active" href="/catalog">Catalog</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4 text-center">Our Collection</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <!-- This loops through the 'books' list sent by the Controller -->
            <div class="col" th:each="book : ${books}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${book.title}">Book Title</h5>
                        <h6 class="card-subtitle mb-2 text-muted" th:text="${book.author}">Author</h6>
                        <p class="card-text text-truncate" th:text="${book.description}">Description</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-primary" th:text="${book.category}">Category</span>
                            <span class="h5 mb-0">₹[[${book.price}]]</span>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-top-0">
                        <button class="btn btn-outline-dark w-100">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
